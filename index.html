<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathQuest - Challenge Your Mind</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
    <!-- HEADER -->
    <header id="app-header">
        <div class="header-left">
            <button id="sidebar-toggle" class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
            <div class="logo">
                <i class="fa-solid fa-brain"></i>
                <span class="logo-text">MathQuest</span>
            </div>
        </div>
        <div class="header-right" id="header-right">
            <!-- Login/Register buttons or Profile shown here -->
        </div>
    </header>

    <!-- SIDEBAR -->
    <nav id="sidebar" class="sidebar">
        <a class="nav-link active" data-page="dashboard" onclick="navigateTo('dashboard')">
            <span class="nav-icon"><i class="fa-solid fa-house"></i></span><span class="nav-text">Dashboard</span>
        </a>
        <a class="nav-link" data-page="quizzes" onclick="navigateTo('quizzes')">
            <span class="nav-icon"><i class="fa-solid fa-gamepad"></i></span><span class="nav-text">Quizzes</span>
        </a>
        <a class="nav-link" data-page="leaderboard" onclick="navigateTo('leaderboard')">
            <span class="nav-icon"><i class="fa-solid fa-trophy"></i></span><span class="nav-text">Leaderboard</span>
        </a>
        <a class="nav-link" data-page="achievements" onclick="navigateTo('achievements')">
            <span class="nav-icon"><i class="fa-solid fa-medal"></i></span><span class="nav-text">Achievements</span>
        </a>
        <a class="nav-link" data-page="settings" onclick="navigateTo('settings')">
            <span class="nav-icon"><i class="fa-solid fa-gear"></i></span><span class="nav-text">Settings</span>
        </a>
    </nav>

    <!-- MAIN CONTENT -->
    <main id="main-content">
        <!-- Pages rendered here by JS -->
    </main>

    <!-- LOGIN MODAL -->
    <div id="login-modal" class="modal-overlay" style="display:none">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('login-modal')">&times;</button>
            <h2>Login to MathQuest</h2>
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="login-username" required minlength="2" maxlength="50">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required minlength="6">
                    <i class="fa-solid fa-eye-slash visibility" data-id="login-password" ></i>
                </div>
                <p id="login-error" class="form-error"></p>
                <button type="submit" class="btn btn-primary btn-full">Login</button>
            </form>
            <p class="modal-switch">Don't have an account? <a onclick="openModal('register-modal'); closeModal('login-modal')">Register</a></p>
        </div>
    </div>

    <!-- REGISTER MODAL -->
    <div id="register-modal" class="modal-overlay" style="display:none">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('register-modal')">&times;</button>
            <h2>Create Account</h2>
            <form id="register-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="reg-username" required minlength="2" maxlength="50">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password"  minlength="6" >
                    <i class="fa-solid fa-eye-slash visibility" data-id="reg-password" ></i>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="reg-confirm" required minlength="6">
                    <i class="fa-solid fa-eye-slash visibility" data-id="reg-confirm" ></i>
                    
                    <p id="containLabel" class="format label" style="display: block;"> Password must contain:</p>
                    <p id="upperCase" class="format" style="display: block;">• uppercase letter</p>
                    <p id="lowerCase" class="format" style="display: block;">• lowercase letter</p>
                    <p id="number" class="format" style="display: block;">• number</p>
                    <p id="specialChar" class="format" style="display: block;">• special character</p>

                </div>
                <p id="register-error" class="form-error" style="display: none;"></p>
                <button type="submit" class="btn btn-primary btn-full">Register</button>
            </form>
            <p class="modal-switch">Already have an account? <a onclick="openModal('login-modal'); closeModal('register-modal')">Login</a></p>
        </div>
    </div>

    <!-- AVATAR MODAL -->
    <div id="avatar-modal" class="modal-overlay" style="display:none">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('avatar-modal')">&times;</button>
            <h2>Choose Your Avatar</h2>
            <div id="avatar-grid" class="avatar-grid"></div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/quiz.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
